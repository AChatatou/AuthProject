spring:
  application:
    name: auth-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/auth-project
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
